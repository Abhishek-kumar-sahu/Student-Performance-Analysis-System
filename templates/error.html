{% extends 'base.html' %}
{% block title %}Error {{ code }}{% endblock %}
{% block full_page %}
<div style="min-height:100vh;background:#0d1117;display:flex;align-items:center;justify-content:center;">
  <div style="text-align:center;padding:48px;">
    <div style="font-size:5rem;font-weight:900;color:#3b82f6;font-family:'JetBrains Mono',monospace;line-height:1;margin-bottom:16px;">{{ code }}</div>
    <div style="font-size:1.1rem;color:#f0f6fc;font-weight:700;margin-bottom:8px;">{{ msg }}</div>
    <a href="/" style="display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);border-radius:8px;color:#3b82f6;font-size:.88rem;margin-top:16px;">← Go Home</a>
  </div>
</div>
{% endblock %}
