{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block page_title %}// <i class="fa-solid fa-lock-open"></i> Change Password{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-left"><h1>Change Password</h1><p>Update your account password securely.</p></div>
</div>
<div style="max-width:520px;">
<div class="card">
  <div class="card-hdr">
    <div class="card-title">
      <div class="card-title-icon" style="background:rgba(0,210,180,.1);color:#00d2b4;"><i class="fa-solid fa-key"></i></div>
      Change Your Password
    </div>
  </div>
  <div style="padding:28px;">
    <form method="POST" autocomplete="off">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="f-group">
        <label class="f-label">Current Password <span style="color:var(--red)">*</span></label>
        <div style="position:relative;">
          <input type="password" name="current_password" id="curPwd" class="f-control" required placeholder="Enter current password" autofocus style="padding-right:44px;"/>
          <button type="button" onclick="togglePwdField('curPwd',this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:.9rem;padding:4px;"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>
      <div class="f-group">
        <label class="f-label">New Password <span style="color:var(--red)">*</span></label>
        <div style="position:relative;">
          <input type="password" name="new_password" id="newPwd" class="f-control" required placeholder="Min 8 chars · upper · lower · digit" style="padding-right:44px;" oninput="checkStrength(this.value)"/>
          <button type="button" onclick="togglePwdField('newPwd',this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:.9rem;padding:4px;"><i class="fa-solid fa-eye"></i></button>
        </div>
        <div style="height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-top:6px;">
          <div id="strBar" style="height:100%;width:0;border-radius:2px;transition:width .3s,background .3s;"></div>
        </div>
        <div id="strLabel" style="font-size:.68rem;font-family:monospace;color:var(--text-dim);margin-top:4px;"></div>
      </div>
      <div class="f-group">
        <label class="f-label">Confirm New Password <span style="color:var(--red)">*</span></label>
        <div style="position:relative;">
          <input type="password" name="confirm_password" id="confPwd" class="f-control" required placeholder="Re-enter new password" style="padding-right:44px;" oninput="checkMatch()"/>
          <button type="button" onclick="togglePwdField('confPwd',this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:.9rem;padding:4px;"><i class="fa-solid fa-eye"></i></button>
        </div>
        <div id="matchLabel" style="font-size:.68rem;font-family:monospace;margin-top:4px;"></div>
      </div>
      <div class="act-row" style="margin-top:8px;">
        <button type="submit" class="btn btn-primary ripple-btn"><i class="fa-solid fa-shield-halved"></i> Update Password</button>
        <a href="javascript:history.back()" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
</div>
{% endblock %}
{% block scripts %}
<script>
function checkStrength(p){
  const bar=document.getElementById("strBar"),lbl=document.getElementById("strLabel");
  let s=0;
  if(p.length>=8)s++;if(/[A-Z]/.test(p))s++;if(/[a-z]/.test(p))s++;if(/\d/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;
  const ls=["","Very Weak","Weak","Fair","Strong","Very Strong"];
  const cs=["","#ef4444","#f97316","#eab308","#22c55e","#10b981"];
  bar.style.width=(s*20)+"%";bar.style.background=cs[s];
  lbl.textContent="Strength: "+ls[s];lbl.style.color=cs[s];
}
function checkMatch(){
  const n=document.getElementById("newPwd").value,c=document.getElementById("confPwd").value;
  const lbl=document.getElementById("matchLabel");
  if(!c)return;
  if(n===c){lbl.innerHTML='<span style="color:#22c55e"><i class="fa-solid fa-circle-check"></i> Passwords match</span>';}
  else{lbl.innerHTML='<span style="color:#ef4444"><i class="fa-solid fa-circle-xmark"></i> Does not match</span>';}
}
</script>
{% endblock %}
